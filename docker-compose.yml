services:
  nginx:
    image: nginx:1.27-alpine
    container_name: argus_nginx
    depends_on:
      - argus-app
      - argus-api
      - titiler
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - argus_network
    restart: unless-stopped

  argus-app:
    build:
      context: ./argus-app
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_CESIUM_ION_TOKEN: ${CESIUM_ION_TOKEN}
        NEXT_PUBLIC_TITILER_URL: /tiles
        NEXT_PUBLIC_GLITCHTIP_DSN: ${NEXT_PUBLIC_GLITCHTIP_DSN}
        NEXT_PUBLIC_SENTRY_TRACES_SAMPLE_RATE: ${NEXT_PUBLIC_SENTRY_TRACES_SAMPLE_RATE:-0.05}
    container_name: argus_app
    expose:
      - "3000"
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
      - NEXT_PUBLIC_CESIUM_ION_TOKEN=${CESIUM_ION_TOKEN}
      - NEXT_PUBLIC_TITILER_URL=/tiles
      - CLOUDFLARE_RADAR_TOKEN=${CLOUDFLARE_RADAR_TOKEN}
      - OTX_API_KEY=${OTX_API_KEY}
      - FRED_API_KEY=${FRED_API_KEY}
      - FRED_SERIES_ID=${FRED_SERIES_ID:-DFF}
      - AISSTREAM_API_KEY=${AISSTREAM_API_KEY}
      - AISSTREAM_ENDPOINT=${AISSTREAM_ENDPOINT:-https://api.aisstream.io/v0/vessels}
      - OPENSKY_CLIENT_ID=${OPENSKY_CLIENT_ID}
      - OPENSKY_CLIENT_SECRET=${OPENSKY_CLIENT_SECRET}
      - GLITCHTIP_APP_DSN=${GLITCHTIP_APP_DSN}
      - NEXT_PUBLIC_GLITCHTIP_DSN=${NEXT_PUBLIC_GLITCHTIP_DSN}
      - SENTRY_TRACES_SAMPLE_RATE=${SENTRY_TRACES_SAMPLE_RATE:-0.1}
      - NEXT_PUBLIC_SENTRY_TRACES_SAMPLE_RATE=${NEXT_PUBLIC_SENTRY_TRACES_SAMPLE_RATE:-0.05}
    depends_on:
      - argus-api
    networks:
      - argus_network
    restart: unless-stopped

  argus-api:
    build:
      context: ./argus-api
      dockerfile: Dockerfile
    container_name: argus_api
    expose:
      - "3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DATABASE_URL=postgresql://argus:argus_dev@postgis:5432/argus
      - REDIS_URL=redis://redis:6379
      - GLITCHTIP_API_DSN=${GLITCHTIP_API_DSN}
      - SENTRY_TRACES_SAMPLE_RATE=${SENTRY_TRACES_SAMPLE_RATE:-0.1}
      - TILES_DIR=/data/tiles
      - TITILER_BASE_PATH=/tiles
      - EVENTS_STREAM_PATH=/api/events/stream
    volumes:
      - ${ARGUS_DATA_ROOT:-/mnt/volume-nyc3-01}/tiles:/data/tiles:ro
    depends_on:
      postgis:
        condition: service_healthy
    networks:
      - argus_network
    restart: unless-stopped

  postgis:
    image: timescale/timescaledb-ha:pg16-all
    container_name: argus_postgis
    environment:
      POSTGRES_DB: argus
      POSTGRES_USER: argus
      POSTGRES_PASSWORD: argus_dev
    volumes:
      - ${ARGUS_DATA_ROOT:-/mnt/volume-nyc3-01}/pgdata:/home/postgres/pgdata
      - ./infra/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U argus -d argus"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - argus_network
    restart: unless-stopped

  titiler:
    image: ghcr.io/developmentseed/titiler:latest
    container_name: argus_titiler
    environment:
      - PORT=80
      - WORKERS_PER_CORE=1
      - WEB_CONCURRENCY=1
    volumes:
      - ${ARGUS_DATA_ROOT:-/mnt/volume-nyc3-01}/tiles:/data/tiles:ro
    networks:
      - argus_network
    restart: unless-stopped

  ingestor:
    build:
      context: ./ingestor
      dockerfile: Dockerfile
    container_name: argus_ingestor
    depends_on:
      postgis:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://argus:argus_dev@postgis:5432/argus
      - REDIS_URL=redis://redis:6379
      - TILES_DIR=/data/tiles
      - GFS_CRON=0 */6 * * *
      - LOG_LEVEL=INFO
    volumes:
      - ${ARGUS_DATA_ROOT:-/mnt/volume-nyc3-01}/tiles:/data/tiles
    networks:
      - argus_network
    restart: unless-stopped

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: argus_cloudflared
    command: tunnel --no-autoupdate run
    volumes:
      - ./cloudflared/config.yml:/etc/cloudflared/config.yml:ro
      - ./cloudflared/credentials.json:/etc/cloudflared/credentials.json:ro
    depends_on:
      - nginx
    networks:
      - argus_network
    restart: unless-stopped

networks:
  argus_network:

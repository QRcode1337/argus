events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;
  sendfile on;
  keepalive_timeout 65;
  resolver 127.0.0.11 valid=10s ipv6=off;
  resolver_timeout 5s;

  map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
  }

  server {
    listen 80;
    server_name _;
    set $argus_app http://argus-app:3000;
    set $argus_api http://argus-api:3001;
    set $titiler http://titiler:80;
    set $phantom http://phantom:7700;

    # Basic origin hardening against common internet scan paths.
    location ^~ /vendor/phpunit/ { return 444; }
    location ^~ /phpmyadmin/ { return 444; }
    location ^~ /.git/ { return 444; }
    location = /.env { return 444; }

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Phantom anomaly detection — direct to Rust sidecar
    location /api/anomalies/ {
      proxy_pass $phantom;
      proxy_http_version 1.1;
      proxy_read_timeout 10s;
    }

    location /ws/anomalies/ {
      proxy_pass $phantom;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_read_timeout 3600s;
    }

    location /api/feeds/ {
      proxy_pass $argus_app;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_read_timeout 30s;
    }

    # Phantom Next.js proxy routes
    location /api/phantom/ {
      proxy_pass $argus_app;
      proxy_http_version 1.1;
    }

    location /api/analytics/ {
      proxy_pass $argus_app;
      proxy_http_version 1.1;
    }

    location /api/ {
      proxy_pass $argus_api;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
    }

    location /tiles/ {
      rewrite ^/tiles/(.*)$ /$1 break;
      proxy_pass $titiler;
      proxy_http_version 1.1;
    }

    location / {
      proxy_pass $argus_app;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
    }
  }
}
